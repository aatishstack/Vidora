name: Unified Pipeline CI checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  android_checks:
    name: Android Verification Build (Native Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository context
        uses: actions/checkout@v4

      - name: Configure Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache dependencies Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify compilation build debug APK
        run: ./gradlew assembleDebug --no-daemon

  backend_checks:
    name: Node Fastify Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository context
        uses: actions/checkout@v4

      - name: Run linting checks
        run: |
          cd backend
          npm ci
          npm run lint --if-present
